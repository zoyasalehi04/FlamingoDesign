name: Automated Random Commit

on:
  schedule:
    - cron: '0 8-22 * * *'
  workflow_dispatch:

jobs:
  random-commit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Git
      run: |
        git config --global user.email "zoyasalehi0024@gmail.com"
        git config --global user.name "zoyasalehi04"

    - name: Random Decision (40% chance)
      id: random_decision
      run: |
        RAND=$((RANDOM % 100))
        if [ $RAND -lt 40 ]; then
          echo "COMMIT=true" >> $GITHUB_ENV
          HOUR=$((RANDOM % 15 + 9))
          echo "RANDOM_HOUR=$HOUR" >> $GITHUB_ENV
          echo "🎲 Today we will commit!"
        else
          echo "COMMIT=false" >> $GITHUB_ENV
          echo "🎲 Today we skip"
        fi

    - name: Select Random Sticker
      if: env.COMMIT == 'true'
      run: |
        if [ ! -f stickers.txt ]; then
          echo -e "❤️\n🎉\n✨\n🚀\n🌟\n💡\n🔥\n🍀\n⭐" > stickers.txt
        fi
        STICKER=$(shuf -n 1 stickers.txt)
        echo "STICKER=$STICKER" >> $GITHUB_ENV

    - name: Make the Commit
      if: env.COMMIT == 'true'
      run: |
        echo "$(date '+%Y-%m-%d %H:%M:%S') → ${{ env.STICKER }}" >> commit-log.txt
        
        git add commit-log.txt
        git commit -m "For You: ${{ env.STICKER }} at ~${{ env.RANDOM_HOUR }}:00"
        git push https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
        echo "✅ Commit successful!"
